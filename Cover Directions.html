<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cover Directions · Nature to Neon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Bricolage+Grotesque:wght@600;700;800&family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Climate+Crisis&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />

<style>
  body { background: #0a0418; }
  /* Canvas overrides */
  dc-app { background: #050010; }

  /* =================== SHARED COVER BASE =================== */
  .cover {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
    color: white;
    font-family: var(--f-body);
  }
  .cover__photo { position: absolute; inset: 0; }
  .cover__photo img { width: 100%; height: 100%; object-fit: cover; }
  .cover__overlay { position: absolute; inset: 0; }
  .cover__body { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 56px; }

  /* =================== A · CINEMATIC POSTER =================== */
  .cover-a .cover__overlay {
    background:
      radial-gradient(ellipse at 50% 60%, transparent 0%, rgba(10,4,24,0.75) 70%),
      linear-gradient(180deg, rgba(20,8,4,0.4) 0%, rgba(10,4,24,0.85) 80%);
  }
  .cover-a .cover__top {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 0.7rem; letter-spacing: 0.24em; text-transform: uppercase;
    font-weight: 700; opacity: 0.85;
  }
  .cover-a__center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .cover-a__sub {
    font-size: 0.78rem; letter-spacing: 0.36em; text-transform: uppercase;
    font-weight: 600; opacity: 0.85; margin-bottom: 36px;
    display: inline-flex; gap: 18px; align-items: center;
  }
  .cover-a__star { color: #ff3d8a; }
  .cover-a__title {
    font-family: var(--f-display); font-weight: 900; line-height: 0.82;
    text-transform: uppercase; letter-spacing: -0.01em;
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 48px;
  }
  .cover-a__nature {
    font-size: 220px;
    background: linear-gradient(180deg, #f5ecdd 0%, #c5673b 80%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .cover-a__to {
    font-family: var(--f-editorial); font-style: italic;
    font-size: 90px; font-weight: 400; text-transform: lowercase;
    opacity: 0.7; margin: -8px 0; letter-spacing: -0.04em;
  }
  .cover-a__neon {
    font-size: 220px;
    background: linear-gradient(180deg, #ff3d8a 0%, #d916b8 50%, #8b5cf6 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 40px rgba(255, 46, 147, 0.5));
  }
  .cover-a__name {
    font-family: var(--f-editorial); font-style: italic;
    font-size: 56px; line-height: 1; margin-bottom: 8px;
  }
  .cover-a__dates {
    font-size: 0.78rem; letter-spacing: 0.32em; text-transform: uppercase;
    font-weight: 600; opacity: 0.7;
  }
  .cover-a__bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    font-size: 0.65rem; letter-spacing: 0.24em; text-transform: uppercase;
    font-weight: 700; opacity: 0.65;
  }
  .cover-a__chapters { display: flex; gap: 28px; }
  .cover-a__chapter { display: flex; gap: 8px; }
  .cover-a__chapter b { color: #ff3d8a; }

  /* =================== B · EDITORIAL MAGAZINE =================== */
  .cover-b { background: #f3e9d3; color: #1a0e08; }
  .cover-b .cover__photo {
    position: absolute; right: 0; top: 0; bottom: 0; left: 50%;
  }
  .cover-b .cover__photo img { opacity: 1; }
  .cover-b .cover__photo::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(168,69,30,0.2), rgba(255,46,147,0.3));
    mix-blend-mode: multiply;
  }
  .cover-b__top {
    position: relative; z-index: 2;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(26,14,8,0.25);
    margin-bottom: 48px;
  }
  .cover-b__mast {
    font-family: var(--f-display); font-weight: 900;
    font-size: 1.8rem; letter-spacing: -0.02em; text-transform: uppercase;
  }
  .cover-b__mast small { font-family: var(--f-editorial); font-style: italic; font-weight: 400; opacity: 0.6; font-size: 0.7rem; letter-spacing: 0; text-transform: none; display: block; margin-top: 2px; }
  .cover-b__issue {
    font-family: var(--f-mono); font-size: 0.7rem; letter-spacing: 0.2em;
    text-align: right; opacity: 0.7;
  }
  .cover-b__main {
    position: relative; z-index: 2;
    width: 55%; padding-right: 32px;
    flex: 1; display: flex; flex-direction: column; justify-content: center;
  }
  .cover-b__kicker {
    font-family: var(--f-mono); font-size: 0.72rem; letter-spacing: 0.28em;
    text-transform: uppercase; color: #a8451e; margin-bottom: 24px; font-weight: 700;
  }
  .cover-b__title {
    font-family: var(--f-editorial); font-size: 168px; line-height: 0.92;
    letter-spacing: -0.04em; margin-bottom: 32px;
  }
  .cover-b__title em {
    font-style: italic; color: #c91d72;
  }
  .cover-b__dek {
    font-family: var(--f-editorial); font-style: italic;
    font-size: 28px; line-height: 1.35; opacity: 0.75; max-width: 440px;
  }
  .cover-b__rule {
    margin: 36px 0;
    border-top: 1px solid rgba(26,14,8,0.25);
  }
  .cover-b__byline {
    font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 600; opacity: 0.7;
  }
  .cover-b__byline b { color: #a8451e; }

  /* =================== C · NEON-NOIR / VEGAS MARQUEE =================== */
  .cover-c {
    background: #0a0418;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,46,147,0.18), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(20,240,225,0.12), transparent 50%);
  }
  .cover-c::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .cover-c__top {
    display: flex; justify-content: space-between; align-items: flex-start;
    position: relative; z-index: 2;
  }
  .cover-c__corner {
    font-family: var(--f-mono); font-size: 0.65rem; letter-spacing: 0.2em;
    color: #14f0e1; opacity: 0.85;
  }
  .cover-c__corner-r { text-align: right; color: #ff2e93; }

  .cover-c__main {
    flex: 1; position: relative; z-index: 2;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center;
  }
  .cover-c__marquee {
    border: 2px solid #ff2e93;
    padding: 36px 80px;
    border-radius: 8px;
    background: rgba(255,46,147,0.05);
    box-shadow:
      0 0 60px rgba(255,46,147,0.4),
      inset 0 0 30px rgba(255,46,147,0.1);
    position: relative;
  }
  .cover-c__marquee::before, .cover-c__marquee::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff2e93;
    box-shadow: 0 0 14px #ff2e93;
  }
  .cover-c__marquee::before { top: 12px; left: 12px; }
  .cover-c__marquee::after { bottom: 12px; right: 12px; }
  .cover-c__kicker {
    font-family: var(--f-mono); font-size: 0.7rem; letter-spacing: 0.32em;
    color: #14f0e1; margin-bottom: 18px; font-weight: 700;
  }
  .cover-c__title {
    font-family: "Climate Crisis", var(--f-display);
    font-size: 240px; line-height: 0.85; letter-spacing: -0.02em;
    color: white;
    text-shadow:
      0 0 12px rgba(255,46,147,0.9),
      0 0 30px rgba(255,46,147,0.6),
      0 0 60px rgba(217,22,184,0.5);
    margin: 0;
  }
  .cover-c__amp {
    font-family: var(--f-editorial); font-style: italic;
    font-size: 100px; line-height: 1; color: #14f0e1;
    text-shadow: 0 0 20px rgba(20,240,225,0.7);
    margin: 4px 0;
  }
  .cover-c__sub {
    font-family: var(--f-mono); font-size: 0.78rem; letter-spacing: 0.3em;
    font-weight: 600; color: white; margin-top: 22px; opacity: 0.85;
  }
  .cover-c__bottom {
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 2;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .cover-c__chip {
    font-family: var(--f-mono); font-size: 0.66rem; letter-spacing: 0.2em;
    padding: 6px 12px; border-radius: 4px;
    border: 1px solid currentColor;
  }
  .cover-c__chip--nature { color: #f5b585; }
  .cover-c__chip--zion   { color: #ff8fb7; }
  .cover-c__chip--vegas  { color: #14f0e1; }
  .cover-c__crew {
    font-family: var(--f-editorial); font-style: italic; font-size: 1.1rem; opacity: 0.85;
  }

  /* =================== ARTBOARD SCALING =================== */
  .artboard-fit { width: 100%; height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" data-presets="react">
    const PHOTOS = {
      bryceSunrise: "https://images.unsplash.com/photo-1601560675288-acb6f5d4ab30?w=1800&q=80",
      bryceHoodoos: "https://images.unsplash.com/photo-1547036967-23d11aacaee0?w=1800&q=80",
      zionCanyon:   "https://images.unsplash.com/photo-1597125927000-2eb8c83a7bcc?w=1800&q=80",
      vegasNeon:    "https://images.unsplash.com/photo-1581351721010-8cf859cb14a4?w=1600&q=80",
      vegasNight:   "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80",
    };

    /* ---------- A · CINEMATIC POSTER ---------- */
    function CoverA() {
      return (
        <div className="cover cover-a">
          <div className="cover__photo">
            <img src={PHOTOS.vegasNight} alt="" style={{opacity: 0.55}} />
          </div>
          <div className="cover__overlay"></div>
          <div className="cover__body">
            <div className="cover-a__top">
              <span>Hunter · 5.0</span>
              <span>BNA → LAS · Jul 12–20, 2026</span>
            </div>
            <div className="cover-a__center">
              <div className="cover-a__sub">
                <span className="cover-a__star">✦</span>
                <span>A Surprise 50th Birthday Journey</span>
                <span className="cover-a__star">✦</span>
              </div>
              <h1 className="cover-a__title">
                <span className="cover-a__nature">Nature</span>
                <span className="cover-a__to">to</span>
                <span className="cover-a__neon">Neon</span>
              </h1>
              <div className="cover-a__name">for Hunter</div>
              <div className="cover-a__dates">9 days · 3 chapters · 1 reveal</div>
            </div>
            <div className="cover-a__bottom">
              <div className="cover-a__chapters">
                <div className="cover-a__chapter"><b>I</b> Bryce</div>
                <div className="cover-a__chapter"><b>II</b> Zion</div>
                <div className="cover-a__chapter"><b>III</b> Vegas</div>
              </div>
              <div>Top secret · do not tell Hunter</div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- B · EDITORIAL MAGAZINE ---------- */
    function CoverB() {
      return (
        <div className="cover cover-b">
          <div className="cover__photo">
            <img src={PHOTOS.zionCanyon} alt="" />
          </div>
          <div className="cover__body" style={{padding: '56px', position: 'relative'}}>
            <div className="cover-b__top">
              <div className="cover-b__mast">
                Nature to Neon
                <small>The Hunter Issue · Vol. 5.0</small>
              </div>
              <div className="cover-b__issue">
                Issue 050<br/>
                July 2026<br/>
                BNA → LAS
              </div>
            </div>
            <div className="cover-b__main">
              <div className="cover-b__kicker">A surprise 50th birthday journey</div>
              <h1 className="cover-b__title">
                Nine days<br/>
                <em>through canyons</em><br/>
                to <em>neon</em>.
              </h1>
              <p className="cover-b__dek">
                The hoodoos at sunrise. The Narrows at noon.
                Then the trip pivots — and the whole crew is waiting in Vegas.
              </p>
              <div className="cover-b__rule"></div>
              <div className="cover-b__byline">
                Bryce Canyon · Zion · Las Vegas · <b>For Hunter — keep the secret</b>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- C · NEON-NOIR / MARQUEE ---------- */
    function CoverC() {
      return (
        <div className="cover cover-c">
          <div className="cover__body">
            <div className="cover-c__top">
              <div className="cover-c__corner">
                ◉ CHAPTER I/III<br/>
                NATURE · BRYCE + ZION<br/>
                JUL 12 — 17
              </div>
              <div className="cover-c__corner cover-c__corner-r">
                CHAPTER III/III ◉<br/>
                NEON · LAS VEGAS<br/>
                JUL 17 — 20
              </div>
            </div>
            <div className="cover-c__main">
              <div className="cover-c__marquee">
                <div className="cover-c__kicker">★ Now Playing · July 12 – 20, 2026 ★</div>
                <h1 className="cover-c__title">NATURE</h1>
                <div className="cover-c__amp">&amp;</div>
                <h1 className="cover-c__title" style={{
                  background: 'linear-gradient(180deg, #ff3d8a 0%, #d916b8 100%)',
                  WebkitBackgroundClip: 'text',
                  backgroundClip: 'text',
                  color: 'transparent',
                  textShadow: 'none',
                  filter: 'drop-shadow(0 0 30px rgba(255,46,147,0.6))'
                }}>NEON</h1>
                <div className="cover-c__sub">★ Starring Hunter · 5.0 ★</div>
              </div>
            </div>
            <div className="cover-c__bottom">
              <div style={{display: 'flex', gap: 8}}>
                <span className="cover-c__chip cover-c__chip--nature">BRYCE</span>
                <span className="cover-c__chip cover-c__chip--zion">ZION</span>
                <span className="cover-c__chip cover-c__chip--vegas">VEGAS</span>
              </div>
              <div className="cover-c__crew">7 adults · 5 teens · 1 surprise</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <dc-app data-stage-padding="48">
          <dc-section data-id="covers" data-title="Hero / Cover · Three Directions">
            <dc-artboard data-id="cinematic" data-label="A · Cinematic Poster — bold typography, hero photo, dramatic gradients (matches the live itinerary)"
              data-width="1600" data-height="1000">
              <CoverA />
            </dc-artboard>
            <dc-artboard data-id="editorial" data-label="B · Editorial Magazine — Condé Nast-style cover, serif drama, photo on right"
              data-width="1600" data-height="1000">
              <CoverB />
            </dc-artboard>
            <dc-artboard data-id="neon-noir" data-label="C · Neon-Noir Marquee — Vegas movie-marquee energy, glow, grid floor"
              data-width="1600" data-height="1000">
              <CoverC />
            </dc-artboard>
          </dc-section>
        </dc-app>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    customElements.whenDefined('dc-app').then(() => root.render(<App />));
  </script>
</body>
</html>
