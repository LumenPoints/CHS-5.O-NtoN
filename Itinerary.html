<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hunter 5.0 — Itinerary</title>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e6e6e6;
    --band: #f4f1ec;
    --accent: oklch(0.55 0.12 35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #fafaf8; color: var(--ink); font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 48px 32px 96px; }
  header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; }
  .downloads { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .dl { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--line); border-radius: 6px; background: white; color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500; }
  .dl:hover { border-color: var(--ink); }
  .dl .ext { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; background: white; border: 1px solid var(--line); }
  th, td { padding: 10px 12px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--line); }
  th { background: #f7f6f3; font-weight: 600; font-size: 11.5px; letter-spacing: 0.06em; text-transform: uppercase; color: #555; }
  tr.section td { background: var(--band); font-weight: 600; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); padding: 12px; }
  tr.spacer td { padding: 4px; background: #fafaf8; border: none; }
  td.day { font-weight: 600; white-space: nowrap; }
  td.time { font-variant-numeric: tabular-nums; white-space: nowrap; color: #333; }
  td.notes { color: var(--muted); font-size: 12.5px; }
  .foot { margin-top: 24px; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Hunter 5.0 — Nature to Neon</h1>
      <div class="sub">July 12 – 20, 2026 · Bryce Canyon · Zion · Las Vegas</div>
    </div>
    <div class="sub">Editable itinerary</div>
  </header>

  <div class="downloads">
    <a class="dl" href="Itinerary.xlsx" download>Download Itinerary <span class="ext">.xlsx</span></a>
    <a class="dl" href="Itinerary.csv" download>Download Itinerary <span class="ext">.csv</span></a>
  </div>

  <table id="t">
    <thead>
      <tr><th>Day</th><th>Date</th><th>Weekday</th><th>Location</th><th>Time</th><th>Activity</th><th>Notes</th></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>

  <div class="foot">Open the .xlsx in Excel / Numbers / Google Sheets to edit. The .csv is the same data in a plain-text format.</div>
</div>

<script>
fetch('Itinerary.csv').then(r => r.text()).then(text => {
  const rows = text.split('\n').filter(l => l.length).map(l => l.split(','));
  const body = document.getElementById('body');
  // skip header row (rows[0])
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const tr = document.createElement('tr');
    const isEmpty = r.every(c => c.trim() === '');
    const isSection = r[0] && r[0].trim() !== '' && (r[1] === '' || r[1] === undefined) && (r[0].startsWith('Part ') || r[0] === 'Pre-Trip');
    if (isEmpty) { tr.className = 'spacer'; tr.innerHTML = '<td colspan="7"></td>'; body.appendChild(tr); continue; }
    if (isSection) { tr.className = 'section'; tr.innerHTML = '<td colspan="7">' + r[0] + '</td>'; body.appendChild(tr); continue; }
    tr.innerHTML = `<td class="day">${r[0]||''}</td><td>${r[1]||''}</td><td>${r[2]||''}</td><td>${r[3]||''}</td><td class="time">${r[4]||''}</td><td>${r[5]||''}</td><td class="notes">${r[6]||''}</td>`;
    body.appendChild(tr);
  }
});
</script>
</body>
</html>
